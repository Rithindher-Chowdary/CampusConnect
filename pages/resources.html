<body>
<div id="app-root"></div>

<script type="module">
import { requireAuth, getLayoutHTML, getSidebarHTML, toast, showLoading, openModal, closeModal, uploadFile, timeAgo, formatFileSize, getFileIcon, getFileClass, logout } from '../js/app.js?v=76';
import { db } from '../js/firebase-config.js?v=37';
import { collection, addDoc, getDocs, getDoc, doc, updateDoc, deleteDoc, increment, query, orderBy, where, limit, startAfter, arrayUnion, arrayRemove, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let currentUser, currentUserData;
let lastDoc = null;
let currentFilter = 'all';
let currentSort = 'newest';
let currentType = 'all';
let searchQuery = '';
let allResources = [];

requireAuth(async (user, userData) => {
  currentUser = user;
  currentUserData = userData;
  document.getElementById('app-root').innerHTML = getLayoutHTML('Resources', getPageHTML(userData.role), userData.role);
  initPage();
});

          <div class="custom-dd-item" onclick="selectDD('dd-type','📄 Papers','paper','type')">📄 Papers</div>
          <div class="custom-dd-item" onclick="selectDD('dd-type','💼 Internship','internship','type')">💼 Internship</div>
          <div class="custom-dd-item" onclick="selectDD('dd-type','📋 Assignment','assignment','type')">📋 Assignment</div>
          <div class="custom-dd-item" onclick="selectDD('dd-type','📦 Other','other','type')">📦 Other</div>
        </div>

      <div class="custom-dropdown" id="dd-year">
        <button class="custom-dd-btn" onclick="toggleDD('dd-year')">
          <span id="dd-year-label">All Years</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="custom-dd-menu">
          <div class="custom-dd-item active" onclick="selectDD('dd-year','All Years','all','year')">All Years</div>
          <div class="custom-dd-item" onclick="selectDD('dd-year','1st Year','1','year')">1st Year</div>
          <div class="custom-dd-item" onclick="selectDD('dd-year','2nd Year','2','year')">2nd Year</div>
          <div class="custom-dd-item" onclick="selectDD('dd-year','3rd Year','3','year')">3rd Year</div>
          <div class="custom-dd-item" onclick="selectDD('dd-year','4th Year','4','year')">4th Year</div>
          <div class="custom-dd-item" onclick="selectDD('dd-year','All Years Relevant','all-years','year')">All Years Relevant</div>
        </div>
      </div>
      <!-- Sort Dropdown -->
      <div class="custom-dropdown" id="dd-sort">
        <button class="custom-dd-btn" onclick="toggleDD('dd-sort')">
          <span id="dd-sort-label">🕐 Newest First</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="custom-dd-menu">
          <div class="custom-dd-item active" onclick="selectDD('dd-sort','🕐 Newest First','newest','sort')">🕐 Newest First</div>
          <div class="custom-dd-item" onclick="selectDD('dd-sort','⬇️ Most Downloaded','downloads','sort')">⬇️ Most Downloaded</div>
          <div class="custom-dd-item" onclick="selectDD('dd-sort','⭐ Top Rated','rating','sort')">⭐ Top Rated</div>

  <div id="resources-grid" class="resources-grid">

              <option value="2">2nd Year</option>

          <div class="form-group">
            <label class="form-label">Department</label>
            <select class="form-input" id="res-dept">
              <option value="CSE">CSE</option>
              <option value="ECE">ECE</option>
              <option value="EEE">EEE</option>

              <option value="IT">IT</option>
              <option value="All">All Departments</option>

        <div class="form-group">
          <label class="form-label">File *</label>
          <div class="file-upload-zone" id="upload-zone" onclick="document.getElementById('res-file').click()">
            <div class="upload-icon">📁</div>

          </div>

      <div class="modal-footer">

        <button class="btn btn-primary" id="upload-btn" onclick="submitUpload()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload

      </div>
    </div>
  </div>

  <!-- Resource Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal" style="max-width:600px">
      <div class="modal-header">
        <h2 id="detail-title">Resource Details</h2>
        <button class="modal-close" onclick="closeModal('detailModal')">✕</button>

}

let filterYear = 'all';

function initPage() {
  window.openModal = openModal;
  window._logout = logout;
  window.closeModal = closeModal;
  window.openUploadModal = () => openModal('uploadModal');
  window.handleSearch = (v) => { searchQuery = v.toLowerCase(); renderResources(); };
  window.filterByType = (type, el) => {
    currentType = type;
    document.querySelectorAll('#type-chips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderResources();
  };
  window.filterByYear = (year, el) => {
    filterYear = year;
    document.querySelectorAll('#year-chips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderResources();
  };
  window.handleSort = (val) => { currentSort = val; renderResources(); };
  window.handleFileSelect = (input) => {
    if (input.files[0]) {
      document.getElementById('file-chosen').style.display = 'block';
      document.getElementById('file-chosen').textContent = '✅ ' + input.files[0].name + ' (' + formatFileSize(input.files[0].size) + ')';
    }
  };
  window.submitUpload = submitUpload;
  window.downloadResource = downloadResource;
  window.rateResource = rateResource;
  window.openDetail = openDetail;
  window.deleteResource = deleteResource;
  window.loadMore = () => loadResources(true);

  // Drag and drop
  const zone = document.getElementById('upload-zone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) {
        document.getElementById('res-file').files = e.dataTransfer.files;
        document.getElementById('file-chosen').style.display = 'block';
        document.getElementById('file-chosen').textContent = '✅ ' + file.name + ' (' + formatFileSize(file.size) + ')';
      }
    });
  }

  loadResources();
  loadStats();
}

async function loadResources(append = false) {
  if (!append) { allResources = []; lastDoc = null; }
  try {
    let q = query(collection(db, 'resources'), orderBy('createdAt', 'desc'), limit(12));
    if (lastDoc) q = query(collection(db, 'resources'), orderBy('createdAt', 'desc'), startAfter(lastDoc), limit(12));
    const snap = await getDocs(q);
    if (!snap.empty) lastDoc = snap.docs[snap.docs.length - 1];
    snap.forEach(d => { if (!allResources.find(r => r.id === d.id)) allResources.push({ id: d.id, ...d.data() }); });
    renderResources();
    document.getElementById('load-more-res').style.display = snap.docs.length === 12 ? 'block' : 'none';
  } catch(e) { console.error(e); }
}

function renderResources() {
  let filtered = [...allResources];
  if (searchQuery) filtered = filtered.filter(r => r.title?.toLowerCase().includes(searchQuery) || r.subject?.toLowerCase().includes(searchQuery) || r.authorName?.toLowerCase().includes(searchQuery));
  if (currentType !== 'all') filtered = filtered.filter(r => r.type === currentType);
  if (filterYear !== 'all') filtered = filtered.filter(r => r.year === filterYear || r.year === 'all-years');

  if (currentSort === 'downloads') filtered.sort((a,b) => (b.downloads||0) - (a.downloads||0));
  else if (currentSort === 'rating') filtered.sort((a,b) => (b.avgRating||0) - (a.avgRating||0));
  else filtered.sort((a,b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

  const grid = document.getElementById('resources-grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><h3>No resources found</h3><p>Be the first to upload a resource!</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(r => renderCard(r)).join('');
}

function renderCard(r) {
  const icon = getFileIcon(r.fileName || '');
  const cls = getFileClass(r.fileName || '');
  const stars = renderStars(r.avgRating || 0);
  const myRating = r.ratings?.[currentUser.uid] || 0;
  const typeLabels = { notes:'Notes', paper:'Prev Paper', internship:'Internship', assignment:'Assignment', other:'Other' };
  const typeColors = { notes:'var(--accent)', paper:'var(--accent2)', internship:'var(--accent3)', assignment:'#f59e0b', other:'var(--text-muted)' };
  return `
  <div class="resource-card" onclick="openDetail('${r.id}')">
    <div class="resource-card-header">
      <div class="file-icon-big ${cls}">${icon}</div>
      <div class="resource-badge" style="background:${typeColors[r.type]||'var(--accent)'}20;color:${typeColors[r.type]||'var(--accent)'};border:1px solid ${typeColors[r.type]||'var(--accent)'}40">${typeLabels[r.type]||r.type}</div>
    </div>
    <div class="resource-card-body">
      <h3 class="resource-title">${r.title}</h3>
      <p class="resource-desc">${r.description || 'No description provided.'}</p>
      <div class="resource-meta">
        <span class="meta-tag">📚 ${r.subject || 'General'}</span>
        <span class="meta-tag">📅 ${r.year === 'all-years' ? 'All Years' : (r.year || '?') + 'st Year'}</span>
        <span class="meta-tag">🏛️ ${r.dept || 'All'}</span>
      </div>
    </div>
    <div class="resource-card-footer">
      <div class="resource-author">
        <div class="avatar-sm">${(r.authorName||'U')[0]}</div>
        <div>
          <div class="author-name">${r.authorName || 'Unknown'}</div>
          <div class="author-time">${timeAgo(r.createdAt?.toDate?.())}</div>
        </div>
      </div>
      <div class="resource-actions-row">
        <span class="res-stat">⬇️ ${r.downloads || 0}</span>
        <span class="res-stat">⭐ ${(r.avgRating||0).toFixed(1)}</span>
        <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();downloadResource('${r.id}','${encodeURIComponent(r.fileUrl||'')}','${encodeURIComponent(r.fileName||'')}')">Download</button>
      </div>
    </div>
  </div>`;
}

function renderStars(avg) {
  return [1,2,3,4,5].map(i => `<span style="color:${i<=Math.round(avg)?'#f59e0b':'var(--border)'}">★</span>`).join('');
}

async function openDetail(id) {
  const snap = await getDoc(doc(db, 'resources', id));
  if (!snap.exists()) return;
  const r = { id, ...snap.data() };
  const myRating = r.ratings?.[currentUser.uid] || 0;
  const canDelete = r.authorId === currentUser.uid || currentUserData.role === 'admin';
  const typeColors = { notes:'var(--accent)', paper:'var(--accent2)', internship:'var(--accent3)', assignment:'#f59e0b', other:'var(--text-muted)' };

  document.getElementById('detail-title').textContent = r.title;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-file-preview">
      <div class="file-icon-xl ${getFileClass(r.fileName||'')}">${getFileIcon(r.fileName||'')}</div>
      <div class="detail-file-info">
        <div class="detail-file-name">${r.fileName || 'Unknown file'}</div>
        <div class="detail-file-size">${formatFileSize(r.fileSize || 0)}</div>
      </div>
    </div>
    ${r.description ? `<p style="margin:1rem 0;color:var(--text-secondary)">${r.description}</p>` : ''}
    <div class="detail-tags" style="margin:1rem 0">
      <span class="meta-tag">📚 ${r.subject||'General'}</span>
      <span class="meta-tag">📅 ${r.year==='all-years'?'All Years':(r.year||'?')+'st Year'}</span>
      <span class="meta-tag">🏛️ ${r.dept||'All'}</span>
      <span class="meta-tag" style="background:${typeColors[r.type]||'var(--accent)'}20;color:${typeColors[r.type]||'var(--accent)'}">${r.type||'Other'}</span>
    </div>
    <div class="detail-stats-row">
      <div class="detail-stat"><div class="detail-stat-num">⬇️ ${r.downloads||0}</div><div>Downloads</div></div>
      <div class="detail-stat"><div class="detail-stat-num">⭐ ${(r.avgRating||0).toFixed(1)}</div><div>Avg Rating</div></div>
      <div class="detail-stat"><div class="detail-stat-num">👤 ${Object.keys(r.ratings||{}).length}</div><div>Ratings</div></div>
    </div>
    <div class="detail-author-row">
      <div class="avatar-sm">${(r.authorName||'U')[0]}</div>
      <div><div class="author-name">${r.authorName}</div><div class="author-time">Uploaded ${timeAgo(r.createdAt?.toDate?.())}</div></div>
    </div>
    <div class="rating-section">
      <p style="font-weight:600;margin-bottom:0.5rem">Rate this resource:</p>
      <div class="star-rating" id="star-rating-${id}">
        ${[1,2,3,4,5].map(i => `<button class="star-btn ${i<=myRating?'active':''}" onclick="rateResource('${id}',${i})" data-val="${i}">★</button>`).join('')}
      </div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-top:0.3rem">Your rating: ${myRating || 'Not rated'}</p>
    </div>
  `;
  document.getElementById('detail-footer').innerHTML = `
    ${canDelete ? `<button class="btn btn-danger" onclick="deleteResource('${id}')">🗑 Delete</button>` : ''}
    <div style="flex:1"></div>
    <button class="btn btn-secondary" onclick="closeModal('detailModal')">Close</button>
    <button class="btn btn-primary" onclick="downloadResource('${id}','${encodeURIComponent(r.fileUrl||'')}','${encodeURIComponent(r.fileName||'')}')">⬇️ Download</button>
  `;
  openModal('detailModal');
}

async function downloadResource(id, urlEncoded, nameEncoded) {
  let url = decodeURIComponent(urlEncoded);
  if (!url) { toast('File URL not available', 'error'); return; }
  try {
    await updateDoc(doc(db, 'resources', id), { downloads: increment(1) });
    // Force fl_attachment in Cloudinary URL so it downloads instead of opening
    // Replace /upload/ with /upload/fl_attachment/ to trigger download
    const downloadUrl = url.replace('/upload/', '/upload/fl_attachment/');
    window.open(downloadUrl, '_blank');
    toast('Download started!', 'success');
    allResources = allResources.map(r => r.id === id ? { ...r, downloads: (r.downloads||0)+1 } : r);
    renderResources();
  } catch(e) { toast('Download failed', 'error'); }
}

async function rateResource(id, rating) {
  try {
    const ref = doc(db, 'resources', id);
    const snap = await getDoc(ref);
    const data = snap.data();
    const ratings = { ...data.ratings, [currentUser.uid]: rating };
    const avg = Object.values(ratings).reduce((a,b)=>a+b,0) / Object.keys(ratings).length;
    await updateDoc(ref, { [`ratings.${currentUser.uid}`]: rating, avgRating: avg });
    document.querySelectorAll(`#star-rating-${id} .star-btn`).forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.val) <= rating);
    });
    toast('Rating saved!', 'success');
    allResources = allResources.map(r => r.id === id ? { ...r, ratings, avgRating: avg } : r);
    renderResources();
  } catch(e) { toast('Failed to rate', 'error'); }
}

async function deleteResource(id) {
  if (!confirm('Delete this resource permanently?')) return;
  try {
    await deleteDoc(doc(db, 'resources', id));
    allResources = allResources.filter(r => r.id !== id);
    renderResources();
    closeModal('detailModal');
    toast('Resource deleted', 'success');
  } catch(e) { toast('Delete failed', 'error'); }
}

async function submitUpload() {
  const title = document.getElementById('res-title').value.trim();
  const desc = document.getElementById('res-desc').value.trim();
  const type = document.getElementById('res-type').value;
  const subject = document.getElementById('res-subject').value.trim();
  const year = document.getElementById('res-year').value;
  const dept = document.getElementById('res-dept').value;
  const file = document.getElementById('res-file').files[0];

  if (!title || !type || !subject || !file) { toast('Please fill all required fields and select a file', 'error'); return; }
  if (file.size > 50 * 1024 * 1024) { toast('File too large. Max 50MB', 'error'); return; }

  const btn = document.getElementById('upload-btn');
  btn.disabled = true; btn.textContent = 'Uploading...';
  document.getElementById('upload-progress-wrap').style.display = 'block';

  try {
    const path = `resources/${currentUser.uid}/${Date.now()}_${file.name}`;
    const url = await uploadFile(file, path, (pct) => {
      document.getElementById('upload-prog').style.width = pct + '%';
      document.getElementById('upload-prog-text').textContent = `Uploading... ${pct}%`;
    });
    const docData = {
      title, description: desc, type, subject, year, dept,
      fileUrl: url, fileName: file.name, fileSize: file.size,
      authorId: currentUser.uid, authorName: currentUserData.name || currentUserData.email,
      downloads: 0, avgRating: 0, ratings: {},
      createdAt: serverTimestamp()
    };
    const newDoc = await addDoc(collection(db, 'resources'), docData);
    await updateDoc(doc(db, 'users', currentUser.uid), { reputation: increment(5) });
    allResources.unshift({ id: newDoc.id, ...docData, createdAt: { toDate: () => new Date(), toMillis: () => Date.now() } });
    renderResources();
    closeModal('uploadModal');
    toast('Resource uploaded successfully! +5 rep', 'success');
    document.getElementById('res-title').value = '';
    document.getElementById('res-desc').value = '';
    document.getElementById('res-type').value = '';
    document.getElementById('res-subject').value = '';
    document.getElementById('res-file').value = '';
    document.getElementById('file-chosen').style.display = 'none';
    document.getElementById('upload-progress-wrap').style.display = 'none';
  } catch(e) { console.error(e); toast('Upload failed: ' + e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Upload'; }
}

async function loadStats() {
  try {
    const snap = await getDocs(collection(db, 'resources'));
    let totalDownloads = 0, mine = 0;
    const subjects = new Set();
    snap.forEach(d => {
      const data = d.data();
      totalDownloads += data.downloads || 0;
      if (data.authorId === currentUser.uid) mine++;
      if (data.subject) subjects.add(data.subject.toLowerCase());
    });
    document.getElementById('stat-total').textContent = snap.size;
    document.getElementById('stat-downloads').textContent = totalDownloads;
    document.getElementById('stat-mine').textContent = mine;
    document.getElementById('stat-subjects').textContent = subjects.size;
  } catch(e) {}
}

  window.toggleDD = function(id) {
    document.querySelectorAll('.custom-dropdown').forEach(function(d) { if (d.id !== id) d.classList.remove('open'); });
    document.getElementById(id).classList.toggle('open');
  };
  window.selectDD = function(id, label, val, type) {
    document.getElementById(id + '-label').textContent = label;
    document.querySelectorAll('#' + id + ' .custom-dd-item').forEach(function(i) { i.classList.remove('active'); });
    event.target.classList.add('active');
    document.getElementById(id).classList.remove('open');
    if (type === 'type') { currentType = val; currentPage = 0; renderResources(); }
    else if (type === 'year') { currentYear = val; currentPage = 0; renderResources(); }
    else if (type === 'sort') { handleSort(val); }
  };
  document.addEventListener('click', function(e) { if (!e.target.closest('.custom-dropdown')) document.querySelectorAll('.custom-dropdown').forEach(function(d) { d.classList.remove('open'); }); });
</script>
