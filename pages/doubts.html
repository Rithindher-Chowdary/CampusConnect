requireAuth((user, userData) => {

  document.getElementById('app-root').innerHTML = getLayoutHTML('Doubt Solver', `

                <div id="answer-file-chosen" style="display:none;margin:6px 0 4px;font-size:0.78rem;color:var(--accent3);font-weight:600;display:flex;align-items:center;gap:6px"></div>

function showDoubtList() {
  document.getElementById('doubt-list-view').classList.remove('hidden');
  document.getElementById('doubt-detail-view').classList.remove('active');
  currentDoubtId = null;
}
window.showDoubtList = showDoubtList;

// ==================== GOOGLE GEMINI AI DOUBT SOLVER ====================
async function askAiForAnswer(doubtId) {
  const doubtRef = doc(db, 'doubts', doubtId);
  const doubtSnap = await getDoc(doubtRef);
  if (!doubtSnap.exists()) return;

  const doubt = doubtSnap.data();

  if (doubt.aiAnswered === true) {
    toast("Campus AI has already answered this doubt", "info");
    return;
  }

  if (!confirm("Let Campus AI solve this doubt?")) return;

  const aiBtn = document.getElementById(`ai-btn-${doubtId}`);
  if (aiBtn) {
    aiBtn.disabled = true;
    aiBtn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> AI Thinking...`;
  }

  try {
    const aiResponse = await callGeminiApi(doubt.title, doubt.description || '');

    await addDoc(collection(db, 'doubts', doubtId, 'answers'), {
      content: aiResponse,
      authorId: "ai-assistant",
      authorName: "Campus AI",
      votes: 0,
      votedBy: [],
      isAi: true,
      createdAt: serverTimestamp()
    });

    await updateDoc(doubtRef, { 
      aiAnswered: true,
      answersCount: increment(1),
      status: 'answered'
    });

    toast("Campus AI has answered this doubt! 🤖", "success");

    if (currentDoubtId === doubtId) {
      openDoubt(doubtId);
    } else {
      loadDoubts();
    }
  } catch(e) {
    toast("Failed to get AI answer. Please check your Gemini API key.", "error");
    console.error(e);
    if (aiBtn) {
      aiBtn.disabled = false;
      aiBtn.innerHTML = `<i class="fa fa-robot"></i> Ask Campus AI`;
    }
  }
}
window.askAiForAnswer = askAiForAnswer;

// ==================== GOOGLE GEMINI API CALL (Improved) ====================
async function callGeminiApi(title, description) {
  // ←←← PUT YOUR REAL GEMINI API KEY HERE ←←←
  const GEMINI_API_KEY = "AIzaSyBO-k0iHEeXcjhn9QvRzFUvuc3ul63CSH8";   // Change this to your actual key

  if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE" || GEMINI_API_KEY.length < 30) {
    throw new Error("Gemini API key is missing. Please add your real key in the code.");
  }

  const systemPrompt = `You are Campus AI, an expert, patient, and enthusiastic college professor teaching undergraduate engineering students.

Your answers should be:
- Clear and well-structured with headings and bullet points
- Include practical Java code examples when relevant
- Explain concepts step-by-step
- Use simple language first, then go into details
- Be accurate and avoid hallucination`;

  const userPrompt = `Doubt Title: ${title}

Description: ${description}

Please explain this clearly with good examples and code where helpful.`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + "\n\n" + userPrompt }] }],
        generationConfig: { 
          temperature: 0.7, 
          maxOutputTokens: 1000 
        }
      })
    });

    if (!response.ok) {
      throw new Error(`Gemini API returned status ${response.status}`);
    }

    const data = await response.json();
    return data.candidates[0].content.parts[0].text || "Sorry, I couldn't generate an answer right now.";
  } catch (error) {
    console.error("Gemini API error:", error);
    throw error;
  }
}

// ==================== YOUR ORIGINAL CODE (FULL INTEGRITY) ====================
async function loadDoubtsStats() {
  try {
    const all = await getDocs(collection(db,'doubts'));
    const answered = all.docs.filter(d => d.data().status === 'answered');
    const contributors = new Set(all.docs.map(d => d.data().authorId));
  } catch(e) {}
}

async function loadDoubts(append = false) {
  const container = document.getElementById('doubts-list');
  if (!append) { 
    container.innerHTML = '<div class="loading-spinner">Loading doubts...</div>'; 
  }

  try {
    let q;
    const orderField = sortMode === 'votes' ? 'votes' : 'createdAt';
    if (subjectFilter) {
      q = query(collection(db,'doubts'), where('subject','==',subjectFilter), orderBy(orderField,'desc'), limit(10));
    } else if (sortMode === 'unanswered') {
      q = query(collection(db,'doubts'), where('status','==','open'), orderBy('createdAt','desc'), limit(10));
    } else {
      q = query(collection(db,'doubts'), orderBy(orderField,'desc'), limit(10));
    }

    onSnapshot(q, (snap) => {
      if (!append) container.innerHTML = '';
      if (snap.empty && !append) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">❓</div><div class="empty-state-title">No doubts yet</div><div class="empty-state-desc">Be the first to ask!</div></div>`;
        return;
      }

      snap.docs.forEach(d => {
        const qd = d.data();
        const myVote = qd.votedBy?.includes(currentUser.uid) || false;
        const isUnanswered = (qd.answersCount || 0) === 0;

        const html = `
          <div class="doubt-card" id="doubt-${d.id}" style="display:flex;gap:16px;cursor:pointer" onclick="openDoubt('${d.id}')">
            <div class="doubt-vote">
              <button class="vote-btn ${myVote?'active':''}" onclick="event.stopPropagation();voteDoubt('${d.id}',${myVote})"><i class="fa fa-arrow-up"></i></button>
              <div class="vote-count">${qd.votes||0}</div>
            </div>
            <div class="doubt-body" style="flex:1">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                <span class="status-badge ${qd.status||'open'}">${qd.status==='answered'?'✅ Answered':'🟢 Open'}</span>
                ${qd.subject?`<span class="tag">${qd.subject}</span>`:''}
              </div>
              <div class="doubt-title">${qd.title}</div>
              <div class="doubt-desc">${(qd.description||'').substring(0,180)}${(qd.description||'').length>180?'...':''}</div>
              <div class="doubt-footer">
                <span><i class="fa fa-user"></i> ${qd.authorName||'Unknown'}</span>
                <span><i class="fa fa-clock"></i> ${timeAgo(qd.createdAt?.toDate())}</span>
                <span><i class="fa fa-comment"></i> ${qd.answersCount||0} answers</span>
                ${isUnanswered ? `<button id="ai-btn-${d.id}" class="ai-btn" onclick="event.stopPropagation();askAiForAnswer('${d.id}')"><i class="fa fa-robot"></i> Ask Campus AI</button>` : ''}
              </div>
            </div>
          </div>`;

        const existing = document.getElementById(`doubt-${d.id}`);
        if (existing) existing.outerHTML = html;
        else container.insertAdjacentHTML('beforeend', html);
      });
    });
  } catch(e) {
    console.error(e);
    container.innerHTML = `<div class="empty-state"><div class="empty-state-title">Error loading doubts</div></div>`;
  }
}

async function voteDoubt(doubtId, hasVoted) {
  const ref = doc(db,'doubts',doubtId);
  if (hasVoted) {
    await updateDoc(ref, { votes: increment(-1), votedBy: arrayRemove(currentUser.uid) });
  } else {
    await updateDoc(ref, { votes: increment(1), votedBy: arrayUnion(currentUser.uid) });
  }
}
window.voteDoubt = voteDoubt;

async function openDoubt(doubtId) {
  currentDoubtId = doubtId;
  document.getElementById('doubt-list-view').classList.add('hidden');
  document.getElementById('doubt-detail-view').classList.add('active');

  const doubtDoc = await getDoc(doc(db,'doubts',doubtId));
  const q = doubtDoc.data();
  const myVote = q.votedBy?.includes(currentUser.uid);

  document.getElementById('doubt-detail-content').innerHTML = `
    <div class="thread-question">
      <div class="thread-q-meta">
        <div class="thread-avatar">${(q.authorName||'U')[0].toUpperCase()}</div>
        <div>
          <span class="thread-author">${q.authorName}</span>
          <span class="thread-time">${timeAgo(q.createdAt?.toDate())}</span>
        </div>
        <div class="thread-tags" style="margin-left:auto">
          <span class="status-badge ${q.status||'open'}">${q.status==='answered'?'✅ Answered':'🟢 Open'}</span>
          ${q.subject?`<span class="tag">${q.subject}</span>`:''}
        </div>
      </div>
      <h2 class="thread-q-title">${q.title}</h2>
      <div class="thread-q-body">${q.description || ''}</div>
      <div class="thread-q-footer">
        <button class="thread-vote-btn ${myVote?'active':''}" onclick="voteDoubt('${doubtId}',${myVote})">
          <i class="fa fa-arrow-up"></i> <span>${q.votes||0}</span>
        </button>
      </div>
    </div>`;

  const replyAvatar = document.getElementById('reply-avatar');
  if (replyAvatar) replyAvatar.textContent = (currentUserData.name||'U')[0].toUpperCase();

  loadAnswers(doubtId, q.bestAnswerId, q.authorId);
}
window.openDoubt = openDoubt;

async function loadAnswers(doubtId, bestAnswerId, doubtAuthorId) {
  const container = document.getElementById('answers-list');
  const q = query(collection(db,'doubts',doubtId,'answers'), orderBy('votes','desc'));
  onSnapshot(q, (snap) => {
    container.innerHTML = '';
    if (snap.empty) {
      container.innerHTML = '<div class="empty-state" style="padding:30px"><div class="empty-state-icon">💬</div><div class="empty-state-title">No answers yet</div><div class="empty-state-desc">Be the first to help or ask AI!</div></div>';
      return;
    }
    snap.docs.forEach(d => {
      const a = d.data();
      const isBest = d.id === bestAnswerId;
      const myVote = a.votedBy?.includes(currentUser.uid);
      const canMarkBest = doubtAuthorId === currentUser.uid && !bestAnswerId;
      const isMe = a.authorId === currentUser.uid;
      const canDelete = (isMe || currentUserData.role==='admin' || currentUserData.role==='faculty') && !isBest;
      container.innerHTML += `
        <div class="thread-comment ${isBest?'best':''}">
          <div class="thread-avatar" style="${isBest?'background:linear-gradient(135deg,var(--accent-success),#16a34a)':''}">${(a.authorName||'U')[0].toUpperCase()}</div>
          <div class="thread-comment-body">
            <div class="thread-comment-header">
              <span class="thread-author">${a.authorName||'Unknown'}</span>
              <span class="thread-time">${timeAgo(a.createdAt?.toDate())}</span>
              ${isBest?'<span class="best-badge">✅ Best Answer</span>':''}
              ${a.isAi ? '<span class="best-badge" style="background:#6366f120;color:#6366f1">🤖 AI Answer</span>' : ''}
            </div>
            <div class="thread-comment-content">${a.content}</div>
            <div class="thread-comment-actions">
              <button class="thread-action-btn ${myVote?'active':''}" onclick="voteAnswer('${doubtId}','${d.id}',${myVote})">
                <i class="fa fa-arrow-up"></i> ${a.votes||0}
              </button>
              ${canMarkBest?`<button class="thread-action-btn success" onclick="markBestAnswer('${doubtId}','${d.id}','${a.authorId}')"><i class="fa fa-check"></i> Mark as Best</button>`:''}
              ${canDelete?`<button class="thread-action-btn danger" onclick="deleteAnswer('${doubtId}','${d.id}')"><i class="fa fa-trash"></i></button>`:''}
            </div>
          </div>
        </div>`;
    });
  });
}

async function voteAnswer(doubtId, answerId, hasVoted) {
  const ref = doc(db,'doubts',doubtId,'answers',answerId);
  if (hasVoted) await updateDoc(ref, { votes: increment(-1), votedBy: arrayRemove(currentUser.uid) });
  else await updateDoc(ref, { votes: increment(1), votedBy: arrayUnion(currentUser.uid) });
}
window.voteAnswer = voteAnswer;

async function markBestAnswer(doubtId, answerId, authorId) {
  await updateDoc(doc(db,'doubts',doubtId), { bestAnswerId: answerId, status: 'answered' });
  toast('Best answer marked!','success');
}
window.markBestAnswer = markBestAnswer;

let answerAttachFile = null;
window.handleAnswerFileSelect = function(input) {
  if (input.files[0]) {
    answerAttachFile = input.files[0];
    const chosen = document.getElementById('answer-file-chosen');
    chosen.style.display = 'flex';
    chosen.innerHTML = `<span>📎</span> ${answerAttachFile.name} <button onclick="clearAnswerFile()" style="background:none;border:none;color:var(--accent-danger);cursor:pointer;font-size:0.8rem;padding:0 4px">✕</button>`;
  }
};
window.clearAnswerFile = function() {
  answerAttachFile = null;
  document.getElementById('answer-file-chosen').style.display = 'none';
  document.getElementById('answer-file-input').value = '';
};

async function postAnswer() {
  const content = document.getElementById('answer-input').value.trim();
  if (!content) { toast('Write your answer first','error'); return; }
  if (!currentDoubtId) return;
  try {
    const btn = document.querySelector('.reply-box .btn-primary');
    btn.disabled = true; btn.textContent = 'Posting...';
    showLoading(true);
    let attachUrl = null, attachName = null, attachType = null;
    if (answerAttachFile) {
      document.getElementById('answer-upload-progress-wrap').style.display = 'block';
      attachUrl = await uploadAttachment(answerAttachFile, (pct) => {
        document.getElementById('answer-upload-prog').style.width = pct + '%';
      });
      attachName = answerAttachFile.name;
      attachType = answerAttachFile.type;
      document.getElementById('answer-upload-progress-wrap').style.display = 'none';
    }
    await addDoc(collection(db,'doubts',currentDoubtId,'answers'), {
      content, authorId: currentUser.uid, authorName: currentUserData.name,
      authorReputation: currentUserData.reputation || 0,
      votes: 0, votedBy: [],
      ...(attachUrl ? { attachUrl, attachName, attachType } : {}),
      createdAt: serverTimestamp()
    });
    await updateDoc(doc(db,'doubts',currentDoubtId), { answersCount: increment(1) });
    await updateDoc(doc(db,'users',currentUser.uid), { answersCount: increment(1), reputation: increment(5) });
    document.getElementById('answer-input').value = '';
    window.clearAnswerFile();
    showLoading(false);
    btn.disabled = false; btn.innerHTML = '<i class="fa fa-paper-plane"></i> Post';
    toast('Answer posted! +5 reputation earned 🎉','success');
  } catch(e) {
    showLoading(false);
    const btn = document.querySelector('.reply-box .btn-primary');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fa fa-paper-plane"></i> Post'; }
    toast('Failed to post answer','error');
  }
}
window.postAnswer = postAnswer;

let doubtAttachFile = null;
window.handleDoubtFileSelect = function(input) {
  if (input.files[0]) {
    doubtAttachFile = input.files[0];
    const chosen = document.getElementById('doubt-file-chosen');
    chosen.style.display = 'flex';
    chosen.innerHTML = `<span>📎</span> ${doubtAttachFile.name} <button onclick="clearDoubtFile()" style="background:none;border:none;color:var(--accent-danger);cursor:pointer;font-size:0.8rem;padding:0 4px">✕</button>`;
    document.getElementById('doubt-attach-zone').style.borderColor = 'var(--accent3)';
  }
};
window.handleDoubtFileDrop = function(e) {
  e.preventDefault();
  document.getElementById('doubt-attach-zone').style.borderColor = 'var(--border)';
  const file = e.dataTransfer.files[0];
  if (file) {
    const allowed = ['image/jpeg','image/png','image/gif','application/pdf'];
    if (!allowed.includes(file.type)) { toast('Only images and PDFs allowed','error'); return; }
    doubtAttachFile = file;
    const chosen = document.getElementById('doubt-file-chosen');
    chosen.style.display = 'flex';
    chosen.innerHTML = `<span>📎</span> ${file.name} <button onclick="clearDoubtFile()" style="background:none;border:none;color:var(--accent-danger);cursor:pointer;font-size:0.8rem;padding:0 4px">✕</button>`;
    document.getElementById('doubt-attach-zone').style.borderColor = 'var(--accent3)';
  }
};
window.clearDoubtFile = function() {
  doubtAttachFile = null;
  document.getElementById('doubt-file-chosen').style.display = 'none';
  document.getElementById('doubt-file-input').value = '';
  document.getElementById('doubt-attach-zone').style.borderColor = 'var(--border)';
};

async function askDoubt() {
  const title = document.getElementById('d-title').value.trim();
  const desc = document.getElementById('d-desc').value.trim();
  const subject = document.getElementById('d-subject').value;
  const year = document.getElementById('d-year').value;
  if (!title || !desc) { toast('Title and description required','error'); return; }
  if (doubtAttachFile && doubtAttachFile.size > 10 * 1024 * 1024) { toast('File too large. Max 10MB','error'); return; }
  try {
    const btn = document.getElementById('ask-doubt-btn');
    btn.disabled = true; btn.textContent = 'Posting...';
    showLoading(true);
    let attachUrl = null, attachName = null, attachType = null;
    if (doubtAttachFile) {
      document.getElementById('doubt-upload-progress-wrap').style.display = 'block';
      attachUrl = await uploadAttachment(doubtAttachFile, (pct) => {
        document.getElementById('doubt-upload-prog').style.width = pct + '%';
        document.getElementById('doubt-upload-prog-text').textContent = `Uploading... ${pct}%`;
      });
      attachName = doubtAttachFile.name;
      attachType = doubtAttachFile.type;
      document.getElementById('doubt-upload-progress-wrap').style.display = 'none';
    }
    await addDoc(collection(db,'doubts'), {
      title, description: desc, subject, year,
      authorId: currentUser.uid, authorName: currentUserData.name,
      authorReputation: currentUserData.reputation || 0,
      votes: 0, votedBy: [], answersCount: 0, status: 'open',
      ...(attachUrl ? { attachUrl, attachName, attachType } : {}),
      createdAt: serverTimestamp()
    });
    closeModal('modal-ask-doubt');
    showLoading(false);
    btn.disabled = false; btn.innerHTML = '<i class="fa fa-question-circle"></i> Post Question';
    toast('Question posted!','success');
    document.getElementById('d-title').value = '';
    document.getElementById('d-desc').value = '';
    window.clearDoubtFile();
  } catch(e) {
    showLoading(false);
    const btn = document.getElementById('ask-doubt-btn');
    btn.disabled = false; btn.innerHTML = '<i class="fa fa-question-circle"></i> Post Question';
    toast('Failed to post question','error');
  }
}
window.askDoubt = askDoubt;

async function deleteDoubt(doubtId) {
  if (!confirm('Delete this question?')) return;
  await deleteDoc(doc(db,'doubts',doubtId));
  toast('Question deleted','success');
}
window.deleteDoubt = deleteDoubt;

async function deleteAnswer(doubtId, answerId) {
  if (!confirm('Delete this answer?')) return;
  await deleteDoc(doc(db,'doubts',doubtId,'answers',answerId));
  await updateDoc(doc(db,'doubts',doubtId), { answersCount: increment(-1) });
}
window.deleteAnswer = deleteAnswer;

function filterSubjectSel(val) { subjectFilter = val; loadDoubts(); }
window.filterSubjectSel = filterSubjectSel;

function filterSortSel(val) { sortMode = val; loadDoubts(); }
window.filterSortSel = filterSortSel;

let searchTimeout;
function searchDoubts(q) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(async () => {
    if (!q.trim()) { loadDoubts(); return; }
    const container = document.getElementById('doubts-list');
    container.innerHTML = '<div class="loading-spinner">Loading...</div>';
    const snap = await getDocs(collection(db,'doubts'));
    const results = snap.docs.filter(d => {
      const data = d.data();
      return data.title?.toLowerCase().includes(q.toLowerCase()) || data.description?.toLowerCase().includes(q.toLowerCase());
    });
    container.innerHTML = '';
    if (!results.length) { container.innerHTML = '<div class="empty-state"><div class="empty-state-title">No results found</div></div>'; return; }
    results.forEach(d => {
      const qd = d.data();
      container.innerHTML += `<div class="doubt-card" style="display:flex;gap:16px;cursor:pointer" onclick="openDoubt('${d.id}')">
        <div class="doubt-vote"><div class="vote-count">${qd.votes||0}</div><div style="font-size:0.7rem;color:var(--text-muted)">votes</div></div>
        <div class="doubt-body" style="flex:1"><div class="doubt-title">${qd.title}</div><div class="doubt-desc">${qd.description?.substring(0,150)||''}</div>
        <div class="doubt-footer"><span><i class="fa fa-comment"></i> ${qd.answersCount||0} answers</span><span><i class="fa fa-clock"></i> ${timeAgo(qd.createdAt?.toDate())}</span></div></div></div>`;
    });
  }, 400);
}
window.searchDoubts = searchDoubts;

window.loadMoreDoubts = () => loadDoubts(true);

</script>
</body>
</html>
