let priorityFilter = 'all';

function initPage() {
  window.openModal = openModal;
  window._logout = logout;
  window.closeModal = closeModal;
  window.filterNotices = (type, el) => {
    currentFilter = type;
    document.querySelectorAll('#notice-type-chips .notice-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderNotices();
  };
  window.filterByPriority = (val) => { priorityFilter = val; renderNotices(); };
  window.filterPriorityBtn = (val, el) => {
    priorityFilter = val;
    document.querySelectorAll('#priority-chips .chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    renderNotices();
  };
  window.submitNotice = submitNotice;
  window.openDetail = openDetail;
  window.deleteNotice = deleteNotice;
  window.bookmarkNotice = bookmarkNotice;
  window.submitPush = submitPush;
  window.submitTip = submitTip;

  loadNotices();
}

// ==================== FIXED: Load Notices + Approved Tips ====================
async function loadNotices() {
  try {
    // Load normal notices
    const noticesSnap = await getDocs(query(collection(db, 'notices'), orderBy('createdAt', 'desc')));
    allNotices = noticesSnap.docs.map(d => ({ 
      id: d.id, 
      ...d.data(), 
      source: 'notices' 
    }));

    // Load approved tips and merge them
    const tipsSnap = await getDocs(query(collection(db, 'notifications'), 
      where('approved', '==', true), 
      orderBy('createdAt', 'desc')));

    tipsSnap.docs.forEach(d => {
      const tip = d.data();
      allNotices.push({
        id: d.id,
        title: tip.title,
        type: tip.type || 'general',
        content: tip.content || '',
        authorName: tip.authorName || 'Admin',
        createdAt: tip.createdAt,
        pinned: false,
        source: 'tip',
        attachUrl: tip.attachUrl,
        attachName: tip.attachName,
        attachType: tip.attachType
      });
    });

    // Sort by date (newest first)
    allNotices.sort((a, b) => {
      const ta = a.createdAt?.toMillis?.() || 0;
      const tb = b.createdAt?.toMillis?.() || 0;
      return tb - ta;
    });

    renderNotices();
  } catch(e) {
    console.error('loadNotices error:', e);
    const el = document.getElementById('notices-list');
    if (el) el.innerHTML = '<p style="color:var(--accent-danger);padding:1rem">Error loading notices. Check console.</p>';
  }
}

function renderNotices() {
  let filtered = [...allNotices];
  if (currentFilter !== 'all') filtered = filtered.filter(n => n.type === currentFilter);
  if (priorityFilter !== 'all') filtered = filtered.filter(n => n.priority === priorityFilter);

  const pinned = filtered.filter(n => n.pinned);
  const regular = filtered.filter(n => !n.pinned);

  const pinnedEl = document.getElementById('pinned-notices');
  if (pinned.length) {
    pinnedEl.innerHTML = `<div class="pinned-section-label">📌 Pinned</div>` + pinned.map(n => renderNoticeCard(n, true)).join('');
  } else { 
    pinnedEl.innerHTML = ''; 
  }

  const list = document.getElementById('notices-list');
  if (regular.length === 0 && pinned.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📢</div><h3>No notices yet</h3><p>Nothing posted in this category</p></div>`;
    return;
  }
  list.innerHTML = regular.map(n => renderNoticeCard(n, false)).join('');
}

const typeConfig = {
  internship: { emoji:'💼', color:'#4f8ef7', bg:'rgba(79,142,247,0.15)' },
  hackathon:  { emoji:'🏆', color:'#7c5cfc', bg:'rgba(124,92,252,0.15)' },
  placement:  { emoji:'🎓', color:'#00d9a3', bg:'rgba(0,217,163,0.15)' },
  exam:       { emoji:'📝', color:'#f59e0b', bg:'rgba(245,158,11,0.15)' },
  event:      { emoji:'🎉', color:'#ec4899', bg:'rgba(236,72,153,0.15)' },
  general:    { emoji:'📋', color:'#9ca3af', bg:'rgba(156,163,175,0.15)' },
};
const priorityConfig = {
  urgent: { label:'🔴 Urgent', color:'#ef4444', bg:'rgba(239,68,68,0.15)' },
  high:   { label:'🟠 High',   color:'#f97316', bg:'rgba(249,115,22,0.15)' },
  normal: { label:'🟢 Normal', color:'#22c55e', bg:'rgba(34,197,94,0.15)' },
};

function renderNoticeCard(n, isPinned) {
  const tc = typeConfig[n.type] || typeConfig.general;
  const pc = priorityConfig[n.priority] || priorityConfig.normal;
  const deadline = n.deadline ? new Date(n.deadline) : null;
  const isExpired = deadline && deadline < new Date();
  const bookmarked = n.bookmarks?.includes(currentUser.uid);
  const canManage = n.authorId === currentUser.uid || currentUserData.role === 'admin';
  const isTip = n.source === 'tip';

  return `
  <div class="notice-card ${isPinned?'pinned':''} ${isExpired?'expired':''}" onclick="openDetail('${n.id}')">
    <div class="notice-card-left">
      <div class="notice-type-badge" style="background:${tc.bg};color:${tc.color}">${isTip ? '💡' : tc.emoji} ${isTip ? 'Tip' : n.type}</div>
    </div>
    <div class="notice-card-body">
      <div class="notice-card-top">
        <h3 class="notice-title">${n.title}</h3>
        <div class="notice-badges">
          <span class="priority-badge" style="background:${pc.bg};color:${pc.color}">${pc.label}</span>
          ${isExpired ? '<span class="expired-badge">Expired</span>' : ''}
          ${isTip ? '<span class="priority-badge" style="background:rgba(0,217,163,0.15);color:#00d9a3">Student Tip</span>' : ''}
        </div>
      </div>
      <p class="notice-preview">${(n.content||'').substring(0,150)}${n.content?.length>150?'...':''}</p>
      <div class="notice-card-footer">
        <div class="notice-meta">
          <span>👤 ${n.authorName}</span>
          <span>🕐 ${timeAgo(n.createdAt?.toDate?.())}</span>
          ${deadline ? `<span>${isExpired?'⌛':'⏰'} ${isExpired?'Expired':'Deadline'}: ${deadline.toLocaleDateString()}</span>` : ''}
          ${n.target && n.target !== 'all' ? `<span>🎯 ${n.target==='final'?'Final Year':n.target+'st Year'}</span>` : ''}
        </div>
        <div class="notice-actions" onclick="event.stopPropagation()">
          <button class="icon-btn ${bookmarked?'active':''}" title="${bookmarked?'Remove bookmark':'Bookmark'}" onclick="bookmarkNotice('${n.id}')">
            ${bookmarked?'🔖':'🏷️'}
          </button>
          ${n.link ? `<a href="${n.link}" target="_blank" class="btn btn-sm btn-secondary" onclick="event.stopPropagation()">Apply →</a>` : ''}
          ${canManage ? `<button class="btn btn-sm btn-danger" onclick="deleteNotice('${n.id}')">Delete</button>` : ''}
        </div>
      </div>
    </div>
  </div>`;
}

async function openDetail(id) {
  const n = allNotices.find(x => x.id === id);
  if (!n) return;
  const tc = typeConfig[n.type] || typeConfig.general;
  const pc = priorityConfig[n.priority] || priorityConfig.normal;
  const deadline = n.deadline ? new Date(n.deadline) : null;
  const isExpired = deadline && deadline < new Date();
  const canManage = n.authorId === currentUser.uid || currentUserData.role === 'admin';
  const isTip = n.source === 'tip';

  document.getElementById('detail-title').textContent = n.title;
  document.getElementById('detail-body').innerHTML = `
    <div class="notice-detail-header">
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem">
        <span class="priority-badge" style="background:${tc.bg};color:${tc.color}">${tc.emoji} ${isTip ? 'Student Tip' : n.type}</span>
        <span class="priority-badge" style="background:${pc.bg};color:${pc.color}">${pc.label}</span>
        ${n.pinned ? '<span class="priority-badge" style="background:rgba(245,158,11,0.15);color:#f59e0b">📌 Pinned</span>' : ''}
        ${isExpired ? '<span class="expired-badge">⌛ Expired</span>' : ''}
      </div>
      <div class="notice-detail-meta">
        <span>👤 Posted by <strong>${n.authorName}</strong></span>
        <span>🕐 ${timeAgo(n.createdAt?.toDate?.())}</span>
        ${deadline ? `<span>${isExpired?'⌛ Expired':'⏰ Deadline'}: <strong>${deadline.toLocaleString()}</strong></span>` : ''}
        ${n.target && n.target !== 'all' ? `<span>🎯 Target: <strong>${n.target==='final'?'Final Year (3rd & 4th)':n.target+'st Year'}</strong></span>` : '<span>🎯 Target: <strong>All Students</strong></span>'}
      </div>
    </div>
    <div class="notice-detail-content">${(n.content||'').replace(/\n/g, '<br/>')}</div>
    ${n.attachUrl ? `<div style="margin-top:14px">
      ${n.attachType?.startsWith('image/')
        ? `<img src="${n.attachUrl}" alt="attachment" style="max-width:100%;max-height:300px;border-radius:var(--radius);border:1px solid var(--border-soft);cursor:pointer" onclick="window.open('${n.attachUrl}','_blank')">`
        : `<a href="${n.attachUrl}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg-card);border:1px solid var(--border-soft);border-radius:var(--radius);font-size:0.82rem;color:var(--accent);text-decoration:none;font-weight:600"><span>📄</span>${n.attachName||'View Attachment'}</a>`
      }
    </div>` : ''}
    ${n.link ? `<div class="notice-link-box"><a href="${n.link}" target="_blank" class="btn btn-primary" style="width:100%">🔗 Apply / Visit Link →</a></div>` : ''}
  `;
  document.getElementById('detail-footer').innerHTML = `
    ${canManage ? `<button class="btn btn-danger" onclick="deleteNotice('${n.id}');closeModal('detailModal')">🗑 Delete</button>` : ''}
    <div style="flex:1"></div>
    <button class="btn btn-secondary" onclick="closeModal('detailModal')">Close</button>
  `;
  openModal('detailModal');
}

window.handleNoticeFileSelect = function(input) {

async function submitNotice() {
  const title = document.getElementById('n-title').value.trim();
  const type = document.getElementById('n-type').value;
  const priority = document.getElementById('n-priority').value;
  const content = document.getElementById('n-content').value.trim();
  const deadline = document.getElementById('n-deadline').value;
  const target = document.getElementById('n-target').value;
  const link = document.getElementById('n-link').value.trim();
  const pinned = document.getElementById('n-pin').checked;

  if (!title || !type || !content) { toast('Title, type and content are required', 'error'); return; }
  if (noticeAttachFile && noticeAttachFile.size > 10 * 1024 * 1024) { toast('File too large. Max 10MB', 'error'); return; }

  try {
    const btn = document.getElementById('notice-submit-btn');
    btn.disabled = true; btn.textContent = 'Posting...';
    let attachUrl = null, attachName = null, attachType = null;
    if (noticeAttachFile) {
      document.getElementById('notice-upload-progress-wrap').style.display = 'block';
      attachUrl = await uploadAttachment(noticeAttachFile, (pct) => {
        document.getElementById('notice-upload-prog').style.width = pct + '%';
        document.getElementById('notice-upload-prog-text').textContent = `Uploading... ${pct}%`;
      });
      attachName = noticeAttachFile.name;
      attachType = noticeAttachFile.type;
      document.getElementById('notice-upload-progress-wrap').style.display = 'none';
    }
    const data = {
      title, type, priority, content, target, pinned,
      deadline: deadline || null,
      link: link || null,
      authorId: currentUser.uid,
      authorName: currentUserData.name || currentUserData.email,
      bookmarks: [],
      ...(attachUrl ? { attachUrl, attachName, attachType } : {}),
      createdAt: serverTimestamp()
    };
    const ref = await addDoc(collection(db, 'notices'), data);
    allNotices.unshift({ id: ref.id, ...data, createdAt: { toDate: () => new Date(), toMillis: () => Date.now() } });
    renderNotices();
    closeModal('postModal');
    btn.disabled = false; btn.innerHTML = '📢 Post Notice';
    toast('Notice posted successfully!', 'success');
    ['n-title','n-content','n-link','n-deadline'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('n-type').value = '';
    document.getElementById('n-pin').checked = false;
    window.clearNoticeFile();
  } catch(e) {
    const btn = document.getElementById('notice-submit-btn');
    btn.disabled = false; btn.innerHTML = '📢 Post Notice';
    toast('Failed to post notice', 'error');
  }
}
window.submitNotice = submitNotice;

    document.getElementById('push-title').value = '';
    document.getElementById('push-content').value = '';
  } catch(e) { toast('Failed to push notification', 'error'); }
}

async function deleteNotice(id) {
  if (!confirm('Delete this notice?')) return;
  try {
    await deleteDoc(doc(db, 'notices', id));
    allNotices = allNotices.filter(n => n.id !== id);
    renderNotices();
    toast('Notice deleted', 'success');
  } catch(e) { toast('Failed to delete', 'error'); }
}

async function bookmarkNotice(id) {
  try {
    const ref = doc(db, 'notices', id);
    const n = allNotices.find(x => x.id === id);
    const has = n.bookmarks?.includes(currentUser.uid);
    if (has) {
      await updateDoc(ref, { bookmarks: arrayRemove(currentUser.uid) });
      n.bookmarks = n.bookmarks.filter(b => b !== currentUser.uid);
    } else {
      await updateDoc(ref, { bookmarks: arrayUnion(currentUser.uid) });
      n.bookmarks = [...(n.bookmarks || []), currentUser.uid];
    }
    renderNotices();
    toast(has ? 'Bookmark removed' : 'Bookmarked!', 'success');
  } catch(e) { toast('Failed', 'error'); }
}

function renderSidebarStats() {
  const counts = {};
  allNotices.forEach(n => { counts[n.type] = (counts[n.type] || 0) + 1; });
  // Note: This function assumes sidebar elements exist. If they don't, it won't break.
  const statsEl = document.getElementById('notice-stats-list');
  if (statsEl) {
    statsEl.innerHTML = Object.entries(counts).map(([type, count]) => {
      const tc = typeConfig[type] || typeConfig.general;
      return `<div class="stat-row" style="display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;border-bottom:1px solid var(--border)">
        <span style="color:${tc.color}">${tc.emoji} ${type}</span>
        <span class="badge">${count}</span>
      </div>`;
    }).join('') || '<p style="color:var(--text-muted);font-size:0.85rem">No notices yet</p>';
  }
}

function renderDeadlines() {
  const upcoming = allNotices
    .filter(n => n.deadline && new Date(n.deadline) > new Date())
    .sort((a,b) => new Date(a.deadline) - new Date(b.deadline))
    .slice(0, 5);
  const deadlinesEl = document.getElementById('deadlines-list');
  if (deadlinesEl) {
    deadlinesEl.innerHTML = upcoming.map(n => {
      const d = new Date(n.deadline);
      const daysLeft = Math.ceil((d - new Date()) / (1000*60*60*24));
      const color = daysLeft <= 2 ? '#ef4444' : daysLeft <= 7 ? '#f97316' : '#22c55e';
      return `<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:0.5rem;cursor:pointer" onclick="openDetail('${n.id}')">
        <span style="font-size:0.82rem;color:var(--text-secondary)">${n.title.substring(0,30)}...</span>
        <span style="font-size:0.75rem;color:${color};white-space:nowrap;font-weight:600">${daysLeft}d left</span>
      </div>`;
    }).join('');
  }
}
