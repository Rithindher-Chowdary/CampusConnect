<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — CampusConnect</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="app-root"></div>

<script type="module">
import { requireAuth, getLayoutHTML, toast, openModal, closeModal, timeAgo, formatFileSize, getFileIcon, getFileClass, uploadFile, logout } from '../js/app.js?v=75';
import { db, auth } from '../js/firebase-config.js?v=75';
import { doc, getDoc, updateDoc, collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { updatePassword, EmailAuthProvider, reauthenticateWithCredential, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

let currentUser, currentUserData;

document.body.classList.add('page-profile');
requireAuth(async (user, userData) => {
  currentUser = user;
  currentUserData = userData;
  document.getElementById('app-root').innerHTML = getLayoutHTML('Profile', getPageHTML(userData), userData.role);
  initPage();
});

function getPageHTML(userData) {
  const initials = (userData.name || userData.email || 'U').split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);
  const repLevel = getRepLevel(userData.reputation || 0);
  return `
  <div class="page-content">
  <div class="profile-layout">
    <!-- Left: Profile Card -->
    <div class="profile-sidebar-col">
      <div class="profile-card">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar" id="profile-avatar">${initials}</div>
          <div class="avatar-level-badge" style="background:${repLevel.color}">${repLevel.icon}</div>
        </div>
        <h2 class="profile-name" id="profile-name">${userData.name || 'User'}</h2>
        <p class="profile-email">${userData.email}</p>
        <div class="profile-role-badge role-${userData.role}">${userData.role}</div>
        <div class="profile-rep">
          <div class="rep-bar-wrap">
            <div class="rep-bar" style="width:${Math.min((userData.reputation||0)/repLevel.next*100,100)}%;background:${repLevel.color}"></div>
          </div>
          <div class="rep-info">
            <span style="color:${repLevel.color};font-weight:700">${repLevel.icon} ${repLevel.label}</span>
            <span style="color:var(--text-muted);font-size:0.8rem">${userData.reputation||0} / ${repLevel.next} rep</span>
          </div>
        </div>
        <div class="profile-info-list">
          <div class="info-row"><span>🎓 Year</span><span>${userData.year ? (()=>{ const y=parseInt(userData.year); return isNaN(y) ? userData.year : y+getOrdinal(y)+' Year'; })() : 'N/A'}</span></div>
          <div class="info-row"><span>🏛️ Dept</span><span>${userData.dept || 'N/A'}</span></div>
          <div class="info-row"><span>🪪 ID</span><span>${userData.studentId || userData.facultyId || 'N/A'}</span></div>
          <div class="info-row"><span>📅 Joined</span><span>${userData.createdAt?.toDate ? userData.createdAt.toDate().toLocaleDateString() : 'N/A'}</span></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="openModal('editModal')">✏️ Edit Profile</button>
        <button class="btn btn-secondary" style="width:100%;margin-top:0.5rem" onclick="openModal('pwdModal')">🔑 Change Password</button>

      </div>


    </div>

    <!-- Right: Content Tabs -->
    <div class="profile-main-col">
      <div class="profile-bio-card" id="bio-card">
        <p id="bio-text" style="color:var(--text-secondary);font-style:italic">${userData.bio || 'No bio yet. Click Edit Profile to add one.'}</p>
      </div>

      <div class="tab-nav" id="profile-tabs">
        <button class="tab-btn active" onclick="switchTab('doubts', this)">❓ My Doubts</button>
        <button class="tab-btn" onclick="switchTab('resources', this)">📚 My Resources</button>
        <button class="tab-btn" onclick="switchTab('answers', this)">✅ My Answers</button>
        <button class="tab-btn" onclick="switchTab('tests', this)">📝 Test Results</button>
      </div>

      <div id="tab-content"><div class="loading-spinner">Loading...</div></div>
    </div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal" style="max-width:500px">
      <div class="modal-header"><h2>Edit Profile</h2><button class="modal-close" onclick="closeModal('editModal')">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Display Name</label><input type="text" class="form-input" id="edit-name" value="${userData.name || ''}"/></div>
        <div class="form-group"><label class="form-label">Bio</label><textarea class="form-input" id="edit-bio" rows="4" placeholder="Tell others about yourself...">${userData.bio || ''}</textarea></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Department</label>
            <select class="form-input" id="edit-dept">
              ${['CSE','ECE','EEE','MECH','CIVIL','IT'].map(d=>`<option value="${d}" ${userData.dept===d?'selected':''}>${d}</option>`).join('')}
            </select>
          </div>
          ${userData.role === 'student' ? `<div class="form-group"><label class="form-label">Year</label>
            <select class="form-input" id="edit-year">
              ${[1,2,3,4].map(y=>`<option value="${y}" ${userData.year==y?'selected':''}>${y}${getOrdinal(y)} Year</option>`).join('')}
            </select>
          </div>` : ''}
        </div>
        <div class="form-group"><label class="form-label">GitHub Profile URL</label><input type="url" class="form-input" id="edit-github" value="${userData.github||''}" placeholder="https://github.com/username"/></div>
        <div class="form-group"><label class="form-label">LinkedIn Profile URL</label><input type="url" class="form-input" id="edit-linkedin" value="${userData.linkedin||''}" placeholder="https://linkedin.com/in/username"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="pwdModal">
    <div class="modal" style="max-width:420px">
      <div class="modal-header"><h2>Change Password</h2><button class="modal-close" onclick="closeModal('pwdModal')">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Current Password</label><input type="password" class="form-input" id="pwd-current" placeholder="Current password"/></div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" id="pwd-new" placeholder="Min 8 characters"/></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" class="form-input" id="pwd-confirm" placeholder="Repeat new password"/></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('pwdModal')">Cancel</button>
        <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
      </div>
    </div>
  </div>
  `;
}

function getRepLevel(rep) {
  if (rep >= 1000) return { label:'Expert', icon:'🏆', color:'#f59e0b', next:2000 };
  if (rep >= 500)  return { label:'Advanced', icon:'💎', color:'#7c5cfc', next:1000 };
  if (rep >= 200)  return { label:'Contributor', icon:'⭐', color:'#4f8ef7', next:500 };
  if (rep >= 50)   return { label:'Member', icon:'🌱', color:'#00d9a3', next:200 };
  return { label:'Newcomer', icon:'🔰', color:'#9ca3af', next:50 };
}
function getOrdinal(n) { return ['st','nd','rd','th'][Math.min(n-1,3)] || 'th'; }

let currentTab = 'doubts';

function initPage() {
  window.openModal = openModal;
  window._logout = logout;
  window.closeModal = closeModal;
  window.switchTab = switchTab;
  window.saveProfile = saveProfile;
  window.changePassword = changePassword;
  loadActivityStats();
  switchTab('doubts', document.querySelector('.tab-btn'));

}

async function loadActivityStats() {
  try {
    const [doubts, answers, resources, tests] = await Promise.all([
      getDocs(query(collection(db, 'doubts'), where('authorId','==',currentUser.uid))),
      getDocs(query(collection(db, 'answers'), where('authorId','==',currentUser.uid))),
      getDocs(query(collection(db, 'resources'), where('authorId','==',currentUser.uid))),
      getDocs(query(collection(db, 'testSubmissions'), where('userId','==',currentUser.uid))),
    ]);
    const passed = tests.docs.filter(d => d.data().passed).length;
    document.getElementById('activity-stats').innerHTML = `
      <div class="act-stat"><span>❓ Doubts Asked</span><span class="act-num">${doubts.size}</span></div>
      <div class="act-stat"><span>✅ Answers Given</span><span class="act-num">${answers.size}</span></div>
      <div class="act-stat"><span>📚 Resources Shared</span><span class="act-num">${resources.size}</span></div>
      <div class="act-stat"><span>📝 Tests Taken</span><span class="act-num">${tests.size}</span></div>
      <div class="act-stat"><span>🏆 Tests Passed</span><span class="act-num">${passed}</span></div>
      <div class="act-stat"><span>⭐ Reputation</span><span class="act-num" style="color:var(--accent)">${currentUserData.reputation||0}</span></div>
    `;
  } catch(e) { document.getElementById('activity-stats').innerHTML = '<p>Failed to load stats</p>'; }
}

async function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('#profile-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  const content = document.getElementById('tab-content');
  content.innerHTML = '<div class="loading-spinner">Loading...</div>';

  try {
    if (tab === 'doubts') {
      const snap = await getDocs(query(collection(db, 'doubts'), where('authorId','==',currentUser.uid), orderBy('createdAt','desc')));
      if (snap.empty) { content.innerHTML = emptyState('❓','No doubts asked yet','Start asking questions!'); return; }
      content.innerHTML = snap.docs.map(d => {
        const data = d.data();
        return `<div class="activity-item">
          <div class="ai-icon">❓</div>
          <div class="ai-body">
            <a href="doubts.html" class="ai-title">${data.title}</a>
            <div class="ai-meta"><span>${data.subject}</span><span>${timeAgo(data.createdAt?.toDate?.())}</span><span>👍 ${data.votes||0} votes</span><span class="status-chip ${data.status==='answered'?'answered':'open'}">${data.status}</span></div>
          </div>
        </div>`;
      }).join('');
    } else if (tab === 'resources') {
      const snap = await getDocs(query(collection(db, 'resources'), where('authorId','==',currentUser.uid), orderBy('createdAt','desc')));
      if (snap.empty) { content.innerHTML = emptyState('📚','No resources uploaded yet','Share your notes!'); return; }
      content.innerHTML = snap.docs.map(d => {
        const data = d.data();
        return `<div class="activity-item">
          <div class="ai-icon">${getFileIcon(data.fileName||'')}</div>
          <div class="ai-body">
            <a href="resources.html" class="ai-title">${data.title}</a>
            <div class="ai-meta"><span>${data.subject}</span><span>${data.type}</span><span>⬇️ ${data.downloads||0} downloads</span><span>⭐ ${(data.avgRating||0).toFixed(1)}</span></div>
          </div>
        </div>`;
      }).join('');
    } else if (tab === 'answers') {
      const snap = await getDocs(query(collection(db, 'answers'), where('authorId','==',currentUser.uid), orderBy('createdAt','desc')));
      if (snap.empty) { content.innerHTML = emptyState('✅','No answers yet','Help others by answering!'); return; }
      content.innerHTML = snap.docs.map(d => {
        const data = d.data();
        return `<div class="activity-item">
          <div class="ai-icon">${data.isBest ? '🏆' : '✅'}</div>
          <div class="ai-body">
            <p class="ai-title">${data.content?.substring(0,100)}...</p>
            <div class="ai-meta"><span>${timeAgo(data.createdAt?.toDate?.())}</span><span>👍 ${data.votes||0}</span>${data.isBest?'<span class="status-chip answered">Best Answer</span>':''}</div>
          </div>
        </div>`;
      }).join('');
    } else if (tab === 'tests') {
      const snap = await getDocs(query(collection(db, 'testSubmissions'), where('userId','==',currentUser.uid), orderBy('submittedAt','desc')));
      if (snap.empty) { content.innerHTML = emptyState('📝','No tests taken yet','Take a test!'); return; }
      content.innerHTML = `<div class="results-table-wrap"><table class="results-table">
        <thead><tr><th>Test</th><th>Score</th><th>Result</th><th>Time</th><th>Date</th></tr></thead>
        <tbody>${snap.docs.map(d => {
          const data = d.data();
          const correct = data.correct || 0;
          const total = data.total || data.totalQuestions || 0;
          const pct = data.score || (total ? Math.round(correct/total*100) : 0);
          return `<tr>
            <td>${data.testTitle||'Test'}</td>
            <td><strong>${pct}%</strong> (${correct}/${total})</td>
            <td><span class="status-chip ${data.passed?'answered':'open'}">${data.passed?'✅ Pass':'❌ Fail'}</span></td>
            <td>${Math.floor((data.timeTaken||0)/60)}m ${(data.timeTaken||0)%60}s</td>
            <td>${data.submittedAt?.toDate ? data.submittedAt.toDate().toLocaleDateString() : ''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
  } catch(e) { content.innerHTML = '<p style="color:var(--text-muted);padding:1rem">Failed to load data</p>'; }
}

function emptyState(icon, title, sub) {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><h3>${title}</h3><p>${sub}</p></div>`;
}

async function saveProfile() {
  const name = document.getElementById('edit-name').value.trim();
  const bio = document.getElementById('edit-bio').value.trim();
  const dept = document.getElementById('edit-dept').value;
  const year = document.getElementById('edit-year')?.value;
  const github = document.getElementById('edit-github').value.trim();
  const linkedin = document.getElementById('edit-linkedin').value.trim();
  if (!name) { toast('Name cannot be empty', 'error'); return; }
  try {
    const updates = { name, bio, dept, github, linkedin };
    if (year) updates.year = year;
    await updateDoc(doc(db, 'users', currentUser.uid), updates);
    await updateProfile(auth.currentUser, { displayName: name });
    toast('Profile updated!', 'success');
    closeModal('editModal');
    document.getElementById('profile-name').textContent = name;
    document.getElementById('bio-text').textContent = bio || 'No bio yet.';
    Object.assign(currentUserData, updates);
  } catch(e) { toast('Update failed: ' + e.message, 'error'); }
}

async function changePassword() {
  const current = document.getElementById('pwd-current').value;
  const newPwd = document.getElementById('pwd-new').value;
  const confirm = document.getElementById('pwd-confirm').value;
  if (!current || !newPwd || !confirm) { toast('All fields required', 'error'); return; }
  if (newPwd !== confirm) { toast('Passwords do not match', 'error'); return; }
  if (newPwd.length < 8) { toast('Min 8 characters', 'error'); return; }
  try {
    const cred = EmailAuthProvider.credential(currentUser.email, current);
    await reauthenticateWithCredential(auth.currentUser, cred);
    await updatePassword(auth.currentUser, newPwd);
    toast('Password updated!', 'success');
    closeModal('pwdModal');
    ['pwd-current','pwd-new','pwd-confirm'].forEach(id => document.getElementById(id).value='');
  } catch(e) {
    if (e.code === 'auth/wrong-password') toast('Current password is incorrect', 'error');
    else toast('Failed: ' + e.message, 'error');
  }
}
</script>

<style>
.profile-layout { display:grid;grid-template-columns:300px 1fr;gap:1.5rem;align-items:start }
.profile-sidebar-col { display:flex;flex-direction:column }
.profile-main-col { display:flex;flex-direction:column;gap:1rem }
.profile-card { background:var(--bg-secondary);border:1px solid var(--border);border-radius:16px;padding:1.5rem;text-align:center }
.profile-avatar-wrap { position:relative;display:inline-block;margin-bottom:1rem }
.profile-avatar { width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:white;margin:0 auto }
.avatar-level-badge { position:absolute;bottom:-4px;right:-4px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;border:2px solid var(--bg-secondary) }
.profile-name { font-size:1.3rem;font-weight:700;margin:0 0 0.25rem }
.profile-email { font-size:0.85rem;color:var(--text-muted);margin:0 0 0.75rem }
.profile-role-badge { display:inline-block;padding:0.2rem 0.75rem;border-radius:20px;font-size:0.8rem;font-weight:600;text-transform:capitalize;margin-bottom:1rem }
.role-student { background:rgba(79,142,247,0.15);color:var(--accent) }
.role-faculty { background:rgba(0,217,163,0.15);color:var(--accent3) }
.role-admin { background:rgba(239,68,68,0.15);color:#ef4444 }
.profile-rep { margin-bottom:1rem }
.rep-bar-wrap { height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden;margin-bottom:0.4rem }
.rep-bar { height:100%;border-radius:3px;transition:width 0.5s }
.rep-info { display:flex;justify-content:space-between;align-items:center }
.profile-info-list { text-align:left;border-top:1px solid var(--border);padding-top:1rem }
.info-row { display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;font-size:0.85rem;border-bottom:1px solid var(--border) }
.info-row span:first-child { color:var(--text-muted) }
.info-row span:last-child { color:var(--text-primary);font-weight:500 }
.act-stat { display:flex;justify-content:space-between;align-items:center;padding:0.4rem 0;font-size:0.85rem;border-bottom:1px solid var(--border) }
.act-num { font-weight:700;color:var(--text-primary) }
.widget-title { font-size:0.9rem;font-weight:700;text-align:left;margin:0 0 0.75rem }
.profile-bio-card { background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:1.25rem }
.tab-nav { display:grid;grid-template-columns:1fr 1fr;gap:0.35rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:0.35rem }
.tab-btn { flex:1;padding:0.6rem;border:none;background:none;color:var(--text-muted);cursor:pointer;border-radius:8px;font-family:inherit;font-size:0.85rem;transition:all .2s }
.tab-btn.active { background:var(--accent);color:white;font-weight:600 }
.activity-item { display:flex;gap:1rem;padding:1rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;margin-bottom:0.6rem;align-items:flex-start }
.ai-icon { font-size:1.5rem;flex-shrink:0 }
.ai-title { font-size:0.95rem;font-weight:600;color:var(--text-primary);text-decoration:none;display:block;margin-bottom:0.3rem }
.ai-title:hover { color:var(--accent) }
.ai-meta { display:flex;gap:0.6rem;flex-wrap:wrap;font-size:0.78rem;color:var(--text-muted) }
.status-chip { padding:0.15rem 0.5rem;border-radius:4px;font-size:0.72rem;font-weight:600 }
.status-chip.open { background:rgba(156,163,175,0.15);color:#9ca3af }
.status-chip.answered { background:rgba(0,217,163,0.15);color:var(--accent3) }
.results-table-wrap { overflow-x:auto }
.results-table { width:100%;border-collapse:collapse;font-size:0.85rem }
.results-table th { padding:0.75rem;text-align:left;font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border) }
.results-table td { padding:0.75rem;border-bottom:1px solid var(--border);color:var(--text-secondary) }
.results-table tr:last-child td { border-bottom:none }
.results-table tr:hover td { background:var(--bg-tertiary) }
@media(max-width:900px){.profile-layout{grid-template-columns:1fr}}
</style>
</body>
</html>
